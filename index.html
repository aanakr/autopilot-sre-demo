<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autopilot SRE Agent - New Relic Substrate MVP</title>
  <meta name="description" content="Production-grade SRE Agent powered by New Relic's Substrate intelligence layer">

  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      box-sizing: border-box;
    }

    .font-mono {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }

    body {
      margin: 0;
      background: #060A08;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Animations */
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes flowPulse {
      0% { stroke-dashoffset: 100; opacity: 0.3; }
      50% { opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0.3; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    .slide-down { animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .bounce { animation: bounce 0.5s ease-in-out 3; }

    /* DAG Styling */
    .dag-node {
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      filter: drop-shadow(0 0 8px rgba(6, 182, 212, 0.3));
    }
    .dag-node:hover {
      transform: scale(1.08);
      filter: drop-shadow(0 0 16px rgba(6, 182, 212, 0.6));
    }

    .dag-edge {
      stroke-dasharray: 8, 4;
      animation: flowPulse 2s linear infinite;
    }

    /* Tree Node Styling */
    .tree-node {
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .tree-node:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    /* Code Diff Styling */
    .diff-line-add {
      background: rgba(34, 197, 94, 0.1);
      border-left: 3px solid rgb(34, 197, 94);
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }
    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #444;
    }

    /* Modal Backdrop */
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
    }

    /* Topology Graph Styles */
    .topology-node {
      transition: all 0.2s ease;
    }
    .topology-node:hover {
      filter: brightness(1.3);
    }

    /* Focus Styles for Accessibility */
    *:focus-visible {
      outline: 2px solid #06b6d4;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useReducer } = React;

    // ==================== STATE MANAGEMENT ====================

    const initialState = {
      phase: 'welcome',
      showDictionary: false,
      expandedTreeNode: null,
      executing: false,
      executionProgress: 0,
      showMicDrop: false,
      selectedDAGNode: null,
      selectedTopologyNode: null,
      historicalIncidentOpen: false,
      loading: false,
    };

    function appReducer(state, action) {
      switch (action.type) {
        case 'SET_PHASE':
          return { ...state, phase: action.payload, loading: false };
        case 'SET_LOADING':
          return { ...state, loading: action.payload };
        case 'TOGGLE_DICTIONARY':
          return { ...state, showDictionary: action.payload };
        case 'TOGGLE_TREE_NODE':
          return { ...state, expandedTreeNode: state.expandedTreeNode === action.payload ? null : action.payload };
        case 'START_EXECUTION':
          return { ...state, executing: true, phase: 'execution' };
        case 'UPDATE_PROGRESS':
          return { ...state, executionProgress: action.payload };
        case 'SHOW_SUCCESS':
          return { ...state, phase: 'success', showMicDrop: true };
        case 'SELECT_DAG_NODE':
          return { ...state, selectedDAGNode: action.payload };
        case 'SELECT_TOPOLOGY_NODE':
          return { ...state, selectedTopologyNode: action.payload };
        case 'TOGGLE_HISTORICAL':
          return { ...state, historicalIncidentOpen: action.payload };
        default:
          return state;
      }
    }

    // ==================== MOCK DATA ====================

    const executionTree = [
      {
        id: 1,
        name: 'Query Entity Graph',
        time: '120ms',
        status: 'complete',
        timestamp: '10:24:48.120',
        metadata: {
          target: 'checkout-api',
          entity_guid: 'MXxBUE18QVBQTElDQVRJT058MTIzNDU2',
          depth: 2,
          nodes_found: 12,
          topology: 'checkout-api → sessions-db → replica-pool',
        }
      },
      {
        id: 2,
        name: 'Parse APM Traces',
        time: '340ms',
        timestamp: '10:24:48.460',
        status: 'complete',
        metadata: {
          trace_id: '7f8a9b2c4e6d1a3f9e5c8d7b6a4f2e1c',
          span_id: '9c8b7a6e5d4c3b2a',
          trace_count: 1432,
          slow_spans: 24,
          span_analysis: 'detected_n+1_pattern',
          primary_span: 'checkout-api.db.sessions.query',
          span_duration: '4.2s',
          query: 'SELECT * FROM sessions WHERE user_id IN (...)',
        }
      },
      {
        id: 3,
        name: 'Read DB Logs',
        time: '180ms',
        timestamp: '10:24:48.640',
        status: 'complete',
        metadata: {
          log_lines: 5421,
          error_signature: 'PG::LockTimeout',
          error_count: 87,
          sql_excerpt: 'Seq Scan on sessions (cost=1542.32..8921.54 rows=42341 width=512)',
          missing_index: 'composite index on (user_id, last_active)',
        }
      },
      {
        id: 4,
        name: 'Query Causal Graph',
        time: '95ms',
        timestamp: '10:24:48.735',
        status: 'complete',
        metadata: {
          graph_depth: 3,
          causal_confidence: 0.94,
          edges_evaluated: 18,
          root_cause: 'N+1 query pattern in sessions lookup',
          propagation_path: 'HTTP 500 ← API timeout ← DB lock ← N+1 query',
        }
      },
      {
        id: 5,
        name: 'Search Knowledge Base',
        time: '210ms',
        timestamp: '10:24:48.945',
        status: 'complete',
        metadata: {
          matched_incident: 'RETRO-INC-4512',
          similarity: 0.92,
          incident_date: '2025-12-15',
          resolution: 'Added composite index on sessions table',
          effectiveness: '94% success rate in similar scenarios',
        }
      },
    ];

    const traceData = {
      trace_id: '7f8a9b2c4e6d1a3f9e5c8d7b6a4f2e1c',
      total_duration: 4237,
      spans: [
        { name: 'checkout-api.http.request', duration: 4237, start: 0, service: 'checkout-api' },
        { name: 'checkout-api.db.sessions.query', duration: 4180, start: 42, service: 'checkout-api', error: true },
        { name: 'sessions-db.query.execute', duration: 4120, start: 84, service: 'sessions-db', error: true },
      ],
    };

    // ==================== MAIN APP COMPONENT ====================

    function AutopilotSRE() {
      const [state, dispatch] = useReducer(appReducer, initialState);
      const { phase, showDictionary, expandedTreeNode, executing, executionProgress, showMicDrop,
              selectedDAGNode, selectedTopologyNode, historicalIncidentOpen } = state;

      // Execution progress simulation
      useEffect(() => {
        if (executing && executionProgress < 100) {
          const timer = setTimeout(() => {
            dispatch({ type: 'UPDATE_PROGRESS', payload: Math.min(executionProgress + 6.67, 100) });
          }, 1000);
          return () => clearTimeout(timer);
        }
        if (executionProgress >= 100 && executing) {
          setTimeout(() => {
            dispatch({ type: 'SHOW_SUCCESS' });
          }, 500);
        }
      }, [executing, executionProgress]);

      // Auto-show dictionary after triage starts
      useEffect(() => {
        if (phase === 'triage') {
          dispatch({ type: 'SET_LOADING', payload: true });
          const timer = setTimeout(() => dispatch({ type: 'TOGGLE_DICTIONARY', payload: true }), 1500);
          const timer2 = setTimeout(() => dispatch({ type: 'SET_PHASE', payload: 'coach' }), 4000);
          return () => { clearTimeout(timer); clearTimeout(timer2); };
        }
      }, [phase]);

      // Keyboard shortcuts
      useEffect(() => {
        const handleKeyPress = (e) => {
          if (e.key === 'Escape') {
            dispatch({ type: 'SELECT_DAG_NODE', payload: null });
            dispatch({ type: 'SELECT_TOPOLOGY_NODE', payload: null });
            dispatch({ type: 'TOGGLE_HISTORICAL', payload: false });
          }
          if (e.key === 'a' || e.key === 'A') {
            if (phase === 'coach') {
              handleApprove();
            }
          }
          if (e.key === 'i' || e.key === 'I') {
            if (phase === 'welcome') {
              handleInvestigate();
            }
          }
        };
        window.addEventListener('keydown', handleKeyPress);
        return () => window.removeEventListener('keydown', handleKeyPress);
      }, [phase]);

      // Auto-dismiss dictionary
      useEffect(() => {
        if (showDictionary) {
          const timer = setTimeout(() => dispatch({ type: 'TOGGLE_DICTIONARY', payload: false }), 8000);
          return () => clearTimeout(timer);
        }
      }, [showDictionary]);

      const handleInvestigate = () => {
        dispatch({ type: 'SET_PHASE', payload: 'triage' });
      };

      const handleApprove = () => {
        dispatch({ type: 'START_EXECUTION' });
      };

      const executionSteps = [
        { progress: 10, time: '[10:25:12]', text: 'kubectl exec -n production checkout-db -- psql -c "CREATE INDEX CONCURRENTLY..."', color: 'text-gray-400' },
        { progress: 20, time: '[10:25:13]', text: '▸ Applying YAML configuration...', color: 'text-blue-400' },
        { progress: 35, time: '[10:25:14]', text: 'Guardrails Gateway: verified target constraints. [AUTHORIZED]', color: 'text-gray-500' },
        { progress: 50, time: '[10:25:16]', text: '▸ Verifying connection pooling...', color: 'text-cyan-400' },
        { progress: 60, time: '[10:25:19]', text: 'Building index concurrently... 45% complete', color: 'text-blue-400' },
        { progress: 70, time: '[10:25:22]', text: 'SUCCESS. Index curr_idx_composite created.', color: 'text-green-400' },
        { progress: 85, time: '[10:25:25]', text: '▸ Apdex baseline recovered (0.42 → 0.98)', color: 'text-green-400' },
        { progress: 100, time: '[10:26:01]', text: '» SLO VALIDATION COMPLETE', color: 'text-green-500 font-bold' },
      ];

      return (
        <div className="h-screen w-screen flex flex-col bg-[#060A08] text-gray-200 overflow-hidden">
          {/* Header */}
          <Header phase={phase} />

          {/* Main Content */}
          <div className="flex flex-1 overflow-hidden">
            {/* Phase Navigation Sidebar */}
            {phase !== 'welcome' && <PhaseNavigation phase={phase} dispatch={dispatch} />}

            {/* LEFT: Conversational Triage (35%) */}
            <TriagePanel
              phase={phase}
              showDictionary={showDictionary}
              showMicDrop={showMicDrop}
              handleInvestigate={handleInvestigate}
              dispatch={dispatch}
            />

            {/* RIGHT: Coach UI (65%) */}
            <CoachPanel
              phase={phase}
              executionTree={executionTree}
              expandedTreeNode={expandedTreeNode}
              executionProgress={executionProgress}
              executing={executing}
              executionSteps={executionSteps}
              handleApprove={handleApprove}
              dispatch={dispatch}
              loading={loading}
            />
          </div>

          {/* Modals */}
          {selectedDAGNode && <DAGNodeModal node={selectedDAGNode} onClose={() => dispatch({ type: 'SELECT_DAG_NODE', payload: null })} />}
          {selectedTopologyNode && <TopologyNodeModal node={selectedTopologyNode} onClose={() => dispatch({ type: 'SELECT_TOPOLOGY_NODE', payload: null })} />}
          {historicalIncidentOpen && <HistoricalIncidentModal onClose={() => dispatch({ type: 'TOGGLE_HISTORICAL', payload: false })} />}
        </div>
      );
    }

    // ==================== SUB-COMPONENTS ====================

    function Header({ phase }) {
      return (
        <header className="h-14 bg-[#090F0C] border-b border-gray-800 flex items-center justify-between px-6 shrink-0">
          <div className="flex items-center gap-4">
            <div className="w-8 h-8 bg-gradient-to-br from-blue-600 to-blue-800 rounded flex items-center justify-center">
              <span className="text-white font-bold text-sm">NR</span>
            </div>
            <div className="flex flex-col">
              <span className="font-bold text-xs uppercase tracking-wider text-white">Autopilot SRE Agent</span>
              <span className="text-[10px] text-gray-500">Substrate v2026.09 • Production</span>
            </div>
          </div>
          {phase !== 'welcome' && (
            <div className="flex items-center gap-3 fade-in">
              <div className="flex items-center gap-2 bg-[#1a1a1a] px-3 py-1.5 rounded border border-blue-500/30">
                <div className="w-2 h-2 rounded-full bg-blue-500 pulse"></div>
                <span className="text-[10px] font-mono text-blue-400 uppercase tracking-tight">Substrate Active</span>
              </div>
              <div className="h-4 w-[1px] bg-gray-700"></div>
              <div className="text-[10px] text-gray-400 flex items-center gap-2">
                <span className="opacity-60">AMG:</span>
                <span className="text-green-500 font-bold">AUTHORIZED</span>
              </div>
            </div>
          )}
        </header>
      );
    }

    function PhaseNavigation({ phase, dispatch }) {
      const phases = [
        { id: 'triage', label: 'Triage', icon: '🔍' },
        { id: 'coach', label: 'Analysis', icon: '🧠' },
        { id: 'execution', label: 'Execution', icon: '⚡' },
        { id: 'success', label: 'Verification', icon: '✓' },
      ];

      const currentIndex = phases.findIndex(p => p.id === phase);

      return (
        <div className="w-16 bg-[#0a0a0a] border-r border-gray-800 flex flex-col items-center py-6 gap-4">
          {phases.map((p, idx) => {
            const isComplete = idx < currentIndex;
            const isCurrent = p.id === phase;
            const isUpcoming = idx > currentIndex;

            return (
              <button
                key={p.id}
                onClick={() => isComplete && dispatch({ type: 'SET_PHASE', payload: p.id })}
                disabled={isUpcoming}
                className={`w-10 h-10 rounded-lg flex items-center justify-center text-lg transition-all ${
                  isCurrent ? 'bg-blue-600 ring-2 ring-blue-400' :
                  isComplete ? 'bg-green-900/30 hover:bg-green-900/50 cursor-pointer' :
                  'bg-gray-900 opacity-30 cursor-not-allowed'
                }`}
                title={p.label}
              >
                {isComplete ? '✓' : p.icon}
              </button>
            );
          })}
        </div>
      );
    }

    function TriagePanel({ phase, showDictionary, showMicDrop, handleInvestigate, dispatch }) {
      return (
        <main className="w-[35%] border-r border-gray-800 flex flex-col overflow-hidden bg-[#050505]">
          <div className="flex-1 overflow-y-auto p-6 space-y-6">
            {phase === 'welcome' && <WelcomeView handleInvestigate={handleInvestigate} />}
            {(phase === 'triage' || phase === 'coach' || phase === 'execution' || phase === 'success') && (
              <ConversationView
                phase={phase}
                showDictionary={showDictionary}
                showMicDrop={showMicDrop}
                dispatch={dispatch}
              />
            )}
          </div>

          {/* Bottom Input */}
          <div className="p-4 border-t border-gray-800 bg-[#0a0a0a] shrink-0">
            <div className="relative flex items-center bg-[#050505] border border-gray-800 rounded p-1.5">
              <div className="w-5 h-5 bg-[#111] border border-gray-700 rounded text-[10px] flex items-center justify-center text-gray-500 ml-1 shrink-0">/</div>
              <input
                type="text"
                placeholder={phase === 'welcome' ? 'Ask about reasoning, context, or next steps...' : 'Ask follow-up questions...'}
                className="bg-transparent border-none outline-none text-xs w-full px-2 py-1 placeholder:text-gray-600 text-gray-300"
              />
            </div>
          </div>
        </main>
      );
    }

    function WelcomeView({ handleInvestigate }) {
      return (
        <div className="space-y-4 fade-in">
          {/* OTel Welcome Box */}
          <div className="bg-gradient-to-br from-blue-900/20 to-purple-900/20 border border-blue-500/30 rounded-lg p-4">
            <div className="flex items-start gap-3">
              <div className="w-10 h-10 bg-blue-500/20 rounded-lg flex items-center justify-center shrink-0">
                <svg className="w-5 h-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
              </div>
              <div>
                <h3 className="text-sm font-bold text-white mb-1">OpenTelemetry Context Initialized</h3>
                <p className="text-xs text-gray-400 leading-relaxed">
                  Your observability data is unified via OTel standards. Substrate will translate custom attributes into canonical schemas for deterministic reasoning.
                </p>
                <div className="mt-2 text-[10px] text-gray-500 font-mono">
                  Coverage: 87% instrumented • Schema: v1.20.0
                </div>
              </div>
            </div>
          </div>

          {/* Incident Alert */}
          <div className="space-y-2">
            <div className="flex items-center gap-2">
              <span className="px-2 py-0.5 bg-red-950 text-red-500 text-[10px] font-bold rounded">CRITICAL</span>
              <h2 className="text-lg font-semibold text-white">P95 Latency Spike: checkout-api</h2>
            </div>
            <div className="text-xs text-gray-400 font-mono">Impact: 1.2M users • Duration: 4m 12s</div>
            <div className="grid grid-cols-3 gap-2 mt-2">
              <div className="bg-[#111] border border-gray-800 rounded p-2">
                <div className="text-[10px] text-gray-500 uppercase">Error Rate</div>
                <div className="text-red-400 font-bold">23%</div>
              </div>
              <div className="bg-[#111] border border-gray-800 rounded p-2">
                <div className="text-[10px] text-gray-500 uppercase">Revenue Risk</div>
                <div className="text-amber-400 font-bold">$450K/hr</div>
              </div>
              <div className="bg-[#111] border border-gray-800 rounded p-2">
                <div className="text-[10px] text-gray-500 uppercase">Apdex</div>
                <div className="text-red-400 font-bold">0.98 → 0.42</div>
              </div>
            </div>
            <p className="text-xs text-gray-400 mt-2">
              P95 latency spiking to 4.2s. Substrate topology analysis detects upstream DB dependency chain with connection pool exhaustion.
            </p>
          </div>

          {/* CTA Button */}
          <div className="space-y-2">
            <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Dynamic Input</label>
            <button
              onClick={handleInvestigate}
              className="w-full text-left bg-[#0a0a0a] hover:bg-[#111] border border-gray-800 hover:border-blue-500/50 p-3 rounded text-xs text-gray-300 transition-all flex items-center gap-2 group"
              aria-label="Investigate root cause and show evidence"
            >
              <span>🔍</span>
              <span>Investigate checkout-api latency spike and show root cause evidence</span>
              <span className="ml-auto text-[9px] text-gray-600 font-mono opacity-0 group-hover:opacity-100 transition-opacity">Press I</span>
            </button>
          </div>
        </div>
      );
    }

    function ConversationView({ phase, showDictionary, showMicDrop, dispatch }) {
      return (
        <div className="space-y-4">
          {/* User Query */}
          <div className="flex items-start gap-3 flex-row-reverse fade-in">
            <div className="w-7 h-7 rounded bg-gray-800 border border-gray-700 flex items-center justify-center shrink-0">
              <span className="text-[9px] font-bold text-gray-400">YOU</span>
            </div>
            <div className="bg-[#111] px-3 py-2 rounded text-xs text-gray-300 border border-gray-800 max-w-[85%]">
              Investigate checkout-api latency spike and show root cause evidence
            </div>
          </div>

          {/* Typing Indicator */}
          {phase === 'triage' && (
            <div className="flex items-start gap-3 fade-in">
              <div className="w-7 h-7 rounded bg-blue-900/30 border border-blue-500/30 flex items-center justify-center shrink-0">
                <div className="flex gap-0.5">
                  <div className="w-1 h-1 bg-blue-400 rounded-full animate-bounce"></div>
                  <div className="w-1 h-1 bg-blue-400 rounded-full animate-bounce" style={{animationDelay: '0.1s'}}></div>
                  <div className="w-1 h-1 bg-blue-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                </div>
              </div>
              <div className="text-xs text-gray-400 italic">Querying Substrate and analyzing telemetry...</div>
            </div>
          )}

          {/* Data Dictionary Alert */}
          {showDictionary && phase === 'triage' && (
            <div className="slide-down bg-cyan-900/10 border-2 border-cyan-500/40 rounded-lg p-3 flex items-start gap-3">
              <span className="text-2xl">💡</span>
              <div>
                <h4 className="text-xs font-bold text-cyan-400 mb-1">Substrate Semantic Normalization</h4>
                <div className="text-[11px] text-cyan-200 leading-relaxed space-y-1">
                  <div>Translated custom key <code className="bg-black/40 px-1 py-0.5 rounded font-mono">txn_id</code> → <code className="bg-black/40 px-1 py-0.5 rounded font-mono text-green-400">trace.id</code></div>
                  <div>Translated <code className="bg-black/40 px-1 py-0.5 rounded font-mono">req_id</code> → <code className="bg-black/40 px-1 py-0.5 rounded font-mono text-green-400">span.id</code></div>
                  <div>Translated <code className="bg-black/40 px-1 py-0.5 rounded font-mono">usr</code> → <code className="bg-black/40 px-1 py-0.5 rounded font-mono text-green-400">user.id</code></div>
                  <div className="text-cyan-500 font-bold mt-2">Match confidence: 100% deterministic</div>
                </div>
              </div>
            </div>
          )}

          {/* Agent Response */}
          {(phase === 'coach' || phase === 'execution' || phase === 'success') && (
            <div className="flex items-start gap-3 fade-in">
              <div className="w-7 h-7 rounded bg-blue-900/30 border border-blue-500/30 flex items-center justify-center shrink-0">
                <svg className="w-4 h-4 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
              </div>
              <div className="space-y-2 max-w-[90%]">
