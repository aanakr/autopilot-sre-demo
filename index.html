<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Relic Autopilot - Autonomous Operations Command Center</title>
  <meta name="description" content="Production-grade SRE Agent powered by New Relic's Substrate intelligence layer">

  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      box-sizing: border-box;
    }

    .font-mono {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }

    body {
      margin: 0;
      background: #060A08;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Animations */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes slideRight {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 15px rgba(0, 172, 105, 0.3); }
      50% { box-shadow: 0 0 25px rgba(0, 172, 105, 0.6); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes progressBar {
      from { width: 0%; }
      to { width: 100%; }
    }

    .animate-spin { animation: spin 1s linear infinite; }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-slideUp { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .animate-slideRight { animation: slideRight 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .animate-glow { animation: glow 2s ease-in-out infinite; }
    .animate-bounce { animation: bounce 0.6s ease-in-out 3; }
    .animate-fadeIn { animation: fadeIn 0.5s ease-out; }

    /* Glassmorphism */
    .glass {
      background: rgba(9, 15, 12, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* Code Diff */
    .diff-add {
      background: rgba(0, 172, 105, 0.15);
      border-left: 3px solid #00AC69;
    }

    .diff-remove {
      background: rgba(239, 68, 68, 0.15);
      border-left: 3px solid #ef4444;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #060A08;
    }

    ::-webkit-scrollbar-thumb {
      background: #1b2e24;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #2a4636;
    }

    /* DAG Edges */
    .dag-edge {
      stroke-dasharray: 8, 4;
      animation: flowPulse 2s linear infinite;
    }

    @keyframes flowPulse {
      0% { stroke-dashoffset: 12; opacity: 0.4; }
      50% { opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0.4; }
    }

    /* Progress bar animation */
    .progress-animate {
      transition: width 1s ease-out;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useReducer } = React;

    // ==================== ICONS ====================
    const Icons = {
      Check: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
        </svg>
      ),
      Loader: ({ className = "w-4 h-4" }) => (
        <svg className={`${className} animate-spin`} fill="none" viewBox="0 0 24 24">
          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
          <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      ),
      Alert: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      ),
      ChevronRight: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
        </svg>
      ),
      ChevronDown: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
        </svg>
      ),
      Play: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="currentColor" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z" />
        </svg>
      ),
      Database: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />
        </svg>
      ),
      Code: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
        </svg>
      ),
      GitCommit: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <circle cx="12" cy="12" r="3" strokeWidth={2} />
          <line x1="3" y1="12" x2="9" y2="12" strokeWidth={2} />
          <line x1="15" y1="12" x2="21" y2="12" strokeWidth={2} />
        </svg>
      ),
      Lock: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      ),
      Zap: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      ),
    };

    // ==================== STATE MANAGEMENT ====================
    const initialState = {
      phase: 'detection', // detection -> analysis -> coach -> execution -> success
      url: 'https://one.newrelic.com/launcher/autopilot/triage?account=14092&incident=none',
      executionTree: [],
      showHistoricalIncident: false,
      showPatternCorpus: false,
      executionProgress: 0,
      countdownTimer: 30,
      showTerminal: false,
    };

    function appReducer(state, action) {
      switch (action.type) {
        case 'START_INVESTIGATION':
          return {
            ...state,
            phase: 'analysis',
            url: 'https://one.newrelic.com/launcher/autopilot/substrate_analysis?account=14092&target=checkout-api',
            executionTree: [
              { id: 1, text: 'Querying 14,240 distributed spans across multicluster workloads...', status: 'loading', delay: 0 },
              { id: 2, text: 'Isolating confounding infrastructure layers via Peter-Clark skeleton pruning...', status: 'pending', delay: 3000 },
              { id: 3, text: 'Orienting unshielded colliders to establish causal direction...', status: 'pending', delay: 6000 },
              { id: 4, text: 'Normalizing custom telemetry tags to OpenTelemetry schema...', status: 'pending', delay: 9000 },
              { id: 5, text: 'Cross-referencing Incident Knowledge Base (92% match found)...', status: 'pending', delay: 12000 },
              { id: 6, text: 'Compiling Causal Proof Chain and remediation options...', status: 'pending', delay: 15000 },
            ]
          };

        case 'UPDATE_TREE_NODE':
          return {
            ...state,
            executionTree: state.executionTree.map(node =>
              node.id === action.payload.id ? { ...node, status: action.payload.status } : node
            )
          };

        case 'SHOW_COACH':
          return {
            ...state,
            phase: 'coach',
            url: 'https://one.newrelic.com/launcher/autopilot/coach_review?account=14092&issue=INC-9824&pane=active'
          };

        case 'TOGGLE_HISTORICAL':
          return { ...state, showHistoricalIncident: !state.showHistoricalIncident };

        case 'TOGGLE_PATTERN_CORPUS':
          return { ...state, showPatternCorpus: !state.showPatternCorpus };

        case 'START_EXECUTION':
          return {
            ...state,
            phase: 'execution',
            url: 'https://one.newrelic.com/launcher/autopilot/remediation_runtime?account=14092&task=scale_and_index',
            showTerminal: true,
            executionProgress: 0
          };

        case 'UPDATE_PROGRESS':
          return { ...state, executionProgress: action.payload };

        case 'START_COUNTDOWN':
          return { ...state, countdownTimer: 30 };

        case 'TICK_COUNTDOWN':
          return { ...state, countdownTimer: Math.max(0, state.countdownTimer - 1) };

        case 'SHOW_SUCCESS':
          return {
            ...state,
            phase: 'success',
            url: 'https://one.newrelic.com/launcher/autopilot/verified_outcome?account=14092&status=success'
          };

        default:
          return state;
      }
    }

    // ==================== URL BAR COMPONENT ====================
    function URLBar({ url }) {
      return (
        <div className="h-10 bg-[#090F0C] border-b border-slate-700/50 px-4 flex items-center gap-3">
          <div className="flex items-center gap-2">
            <div className="w-3 h-3 rounded-full bg-red-500/80"></div>
            <div className="w-3 h-3 rounded-full bg-yellow-500/80"></div>
            <div className="w-3 h-3 rounded-full bg-green-500/80"></div>
          </div>
          <div className="flex-1 bg-[#060A08] rounded px-3 py-1.5 flex items-center gap-2 border border-slate-700/30">
            <Icons.Lock className="w-3 h-3 text-emerald-400" />
            <span className="text-[11px] font-mono text-slate-400 truncate">{url}</span>
          </div>
        </div>
      );
    }

    // ==================== DETECTION PHASE ====================
    function DetectionPhase({ onInvestigate }) {
      return (
        <div className="h-full flex items-center justify-center p-8">
          <div className="max-w-4xl w-full animate-slideUp">
            {/* Alert Banner */}
            <div className="glass border border-red-900/50 rounded-lg p-6 mb-6">
              <div className="flex items-start gap-4">
                <div className="w-12 h-12 rounded-lg bg-red-950/50 flex items-center justify-center shrink-0 animate-glow">
                  <Icons.Alert className="w-6 h-6 text-red-400" />
                </div>
                <div className="flex-1">
                  <div className="flex items-center gap-2 mb-2">
                    <span className="px-2 py-0.5 bg-red-950 text-red-400 text-[10px] font-bold rounded uppercase tracking-wide">Critical</span>
                    <h2 className="text-xl font-semibold text-white">P95 Latency Anomaly: checkout-api</h2>
                  </div>
                  <div className="text-sm text-slate-400 mb-3">
                    <span className="font-mono text-red-400">4,220ms</span> P95 latency detected (baseline: <span className="font-mono text-emerald-400">120ms</span>) •
                    <span className="font-mono text-yellow-400 ml-1">25% error rate</span> •
                    <span className="ml-1">1.2M users impacted</span>
                  </div>
                  <p className="text-xs text-slate-500 leading-relaxed">
                    Severe response time degradation detected on downstream checkout-api service.
                    Substrate topology analysis indicates upstream dependency chain disruption with
                    connection pool exhaustion markers.
                  </p>
                </div>
              </div>
            </div>

            {/* Metrics Cards */}
            <div className="grid grid-cols-3 gap-4 mb-6">
              <div className="glass border border-slate-700/50 rounded-lg p-4">
                <div className="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Error Rate</div>
                <div className="text-2xl font-bold text-red-400 font-mono">23%</div>
                <div className="text-[10px] text-slate-600 mt-1">↑ 18.7% from baseline</div>
              </div>
              <div className="glass border border-slate-700/50 rounded-lg p-4">
                <div className="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Revenue Impact</div>
                <div className="text-2xl font-bold text-yellow-400 font-mono">$450K/hr</div>
                <div className="text-[10px] text-slate-600 mt-1">Estimated lost revenue</div>
              </div>
              <div className="glass border border-slate-700/50 rounded-lg p-4">
                <div className="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Apdex Score</div>
                <div className="text-2xl font-bold text-orange-400 font-mono">0.98 → 0.42</div>
                <div className="text-[10px] text-slate-600 mt-1">57% degradation</div>
              </div>
            </div>

            {/* OTel Context Notice */}
            <div className="glass border border-cyan-900/30 rounded-lg p-4 mb-6">
              <div className="flex items-center gap-3">
                <Icons.Database className="w-5 h-5 text-cyan-400" />
                <div className="flex-1">
                  <div className="text-xs font-semibold text-cyan-400 mb-1">OpenTelemetry Context Initialized</div>
                  <div className="text-[11px] text-slate-400">
                    Your observability data is unified via OTel standards. Substrate will translate custom attributes
                    into canonical schemas for deterministic reasoning.
                  </div>
                  <div className="text-[10px] text-slate-600 mt-1 font-mono">
                    Coverage: 87% instrumented • Schemas: v1.24.0
                  </div>
                </div>
              </div>
            </div>

            {/* Action Button */}
            <button
              onClick={onInvestigate}
              className="w-full bg-[#00AC69] hover:bg-[#00AC69]/90 text-white font-semibold py-4 rounded-lg transition-all flex items-center justify-center gap-3 group"
            >
              <Icons.Zap className="w-5 h-5" />
              <span>Investigate checkout-api latency spike and show root cause evidence</span>
              <Icons.ChevronRight className="w-5 h-5 group-hover:translate-x-1 transition-transform" />
            </button>
          </div>
        </div>
      );
    }

    // ==================== EXECUTION TREE (LEFT PANE) ====================
    function ExecutionTree({ nodes }) {
      return (
        <div className="h-full border-r border-slate-700/50 bg-[#090F0C] flex flex-col">
          <div className="px-4 py-3 border-b border-slate-700/50">
            <div className="text-xs font-bold text-slate-400 uppercase tracking-wider">Agent Execution Trace</div>
          </div>
          <div className="flex-1 overflow-y-auto p-4 space-y-3">
            {nodes.map((node, idx) => (
              <div key={node.id} className="animate-slideRight" style={{ animationDelay: `${idx * 0.1}s` }}>
                <div className="flex items-start gap-3 p-3 rounded-lg glass border border-slate-700/30">
                  <div className="shrink-0 mt-0.5">
                    {node.status === 'loading' && <Icons.Loader className="w-4 h-4 text-cyan-400" />}
                    {node.status === 'complete' && <Icons.Check className="w-4 h-4 text-emerald-400" />}
                    {node.status === 'pending' && <div className="w-4 h-4 rounded-full border-2 border-slate-700"></div>}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className={`text-xs leading-relaxed ${node.status === 'complete' ? 'text-slate-400' : node.status === 'loading' ? 'text-cyan-400' : 'text-slate-600'}`}>
                      {node.text}
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ==================== CAUSAL CANVAS (CENTER PANE) ====================
    function CausalCanvas({ phase, onToggleHistorical, onTogglePattern }) {
      if (phase === 'analysis' || phase === 'coach' || phase === 'execution' || phase === 'success') {
        return (
          <div className="h-full bg-[#060A08] flex flex-col">
            <div className="px-6 py-3 border-b border-slate-700/50">
              <div className="text-xs font-bold text-slate-400 uppercase tracking-wider">Causal Proof Chain</div>
            </div>

            <div className="flex-1 overflow-y-auto p-6">
              {/* Schema Normalization Banner */}
              <div className="mb-6 p-4 rounded-lg glass border border-cyan-900/30 animate-fadeIn">
                <div className="flex items-center gap-2 mb-2">
                  <Icons.Code className="w-4 h-4 text-cyan-400" />
                  <div className="text-xs font-semibold text-cyan-400">Substrate Schema Normalization</div>
                </div>
                <div className="space-y-1 text-[11px] font-mono text-slate-400">
                  <div>✓ Translated <span className="text-yellow-400">custom_txn_id</span> → <span className="text-emerald-400">trace.id</span></div>
                  <div>✓ Translated <span className="text-yellow-400">req_routing_hash</span> → <span className="text-emerald-400">span.id</span></div>
                  <div className="text-[10px] text-slate-600 mt-1">Match confidence: 100% deterministic metadata cleanup</div>
                </div>
              </div>

              {/* DAG Visualization */}
              <div className="mb-6">
                <svg viewBox="0 0 600 400" className="w-full h-auto">
                  <defs>
                    <linearGradient id="symptomGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" stopColor="#ef4444" stopOpacity="0.3" />
                      <stop offset="100%" stopColor="#ef4444" stopOpacity="0.1" />
                    </linearGradient>
                    <linearGradient id="causeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" stopColor="#f59e0b" stopOpacity="0.3" />
                      <stop offset="100%" stopColor="#f59e0b" stopOpacity="0.1" />
                    </linearGradient>
                    <linearGradient id="fixGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" stopColor="#06b6d4" stopOpacity="0.3" />
                      <stop offset="100%" stopColor="#06b6d4" stopOpacity="0.1" />
                    </linearGradient>
                    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
                      <polygon points="0 0, 10 3, 0 6" fill="#06b6d4" />
                    </marker>
                  </defs>

                  {/* Edges */}
                  <line x1="300" y1="80" x2="200" y2="180" stroke="#06b6d4" strokeWidth="2" markerEnd="url(#arrowhead)" className="dag-edge" />
                  <line x1="200" y1="220" x2="300" y2="320" stroke="#06b6d4" strokeWidth="2" markerEnd="url(#arrowhead)" className="dag-edge" />

                  {/* Probability Labels */}
                  <text x="240" y="130" fill="#06b6d4" fontSize="11" fontFamily="monospace">P = 0.94</text>
                  <text x="240" y="280" fill="#06b6d4" fontSize="11" fontFamily="monospace">P = 0.88</text>

                  {/* Node 1: Symptom */}
                  <g className="cursor-pointer transition-all hover:scale-110">
                    <circle cx="300" cy="60" r="50" fill="url(#symptomGrad)" stroke="#ef4444" strokeWidth="2" />
                    <text x="300" y="55" textAnchor="middle" fill="#ef4444" fontSize="11" fontWeight="bold">HTTP 500</text>
                    <text x="300" y="68" textAnchor="middle" fill="#ef4444" fontSize="9">Symptom</text>
                    <text x="300" y="80" textAnchor="middle" fill="#ef4444" fontSize="8" opacity="0.7">checkout-api</text>
                  </g>

                  {/* Node 2: Deploy Event */}
                  <g className="cursor-pointer transition-all hover:scale-110">
                    <circle cx="200" cy="200" r="50" fill="url(#causeGrad)" stroke="#f59e0b" strokeWidth="2" />
                    <text x="200" y="195" textAnchor="middle" fill="#f59e0b" fontSize="11" fontWeight="bold">Deploy</text>
                    <text x="200" y="208" textAnchor="middle" fill="#f59e0b" fontSize="9">4a7f2b1</text>
                    <text x="200" y="220" textAnchor="middle" fill="#f59e0b" fontSize="8" opacity="0.7">payment-svc</text>
                  </g>

                  {/* Node 3: Root Cause */}
                  <g className="cursor-pointer transition-all hover:scale-110">
                    <circle cx="300" cy="340" r="50" fill="url(#causeGrad)" stroke="#f59e0b" strokeWidth="2" />
                    <text x="300" y="335" textAnchor="middle" fill="#f59e0b" fontSize="11" fontWeight="bold">N+1 Query</text>
                    <text x="300" y="348" textAnchor="middle" fill="#f59e0b" fontSize="9">Upstream Cause</text>
                    <text x="300" y="360" textAnchor="middle" fill="#f59e0b" fontSize="8" opacity="0.7">sessions-db</text>
                  </g>

                  {/* Node 4: Mitigation */}
                  <g className="cursor-pointer transition-all hover:scale-110">
                    <circle cx="480" cy="200" r="50" fill="url(#fixGrad)" stroke="#06b6d4" strokeWidth="2" />
                    <text x="480" y="195" textAnchor="middle" fill="#06b6d4" fontSize="11" fontWeight="bold">Add Index</text>
                    <text x="480" y="208" textAnchor="middle" fill="#06b6d4" fontSize="9">Mitigation</text>
                    <text x="480" y="220" textAnchor="middle" fill="#06b6d4" fontSize="8" opacity="0.7">Confidence: 88%</text>
                  </g>

                  {/* Mitigation Arrow */}
                  <line x1="350" y1="340" x2="440" y2="220" stroke="#06b6d4" strokeWidth="2" strokeDasharray="4,4" markerEnd="url(#arrowhead)" />
                </svg>
              </div>

              {/* Knowledge Base Citation */}
              <div className="mb-4">
                <button
                  onClick={onToggleHistorical}
                  className="w-full text-left p-4 rounded-lg glass border border-emerald-900/30 hover:border-emerald-900/50 transition-all group"
                >
                  <div className="flex items-center gap-3">
                    <div className="w-8 h-8 rounded bg-emerald-950/50 flex items-center justify-center shrink-0">
                      <Icons.Database className="w-4 h-4 text-emerald-400" />
                    </div>
                    <div className="flex-1 min-w-0">

    function AutopilotApp() {
      const [state, dispatch] = useReducer(appReducer, initialState);
      const { phase, url, executionTree, showHistoricalIncident, showPatternCorpus,
              executionProgress, countdownTimer, showTerminal } = state;

      // Progressive tree node completion
      useEffect(() => {
        if (phase === 'analysis' && executionTree.length > 0) {
          executionTree.forEach((node, idx) => {
            setTimeout(() => {
              dispatch({ type: 'UPDATE_TREE_NODE', payload: { id: node.id, status: 'loading' } });
              setTimeout(() => {
                dispatch({ type: 'UPDATE_TREE_NODE', payload: { id: node.id, status: 'complete' } });
                if (idx === executionTree.length - 1) {
                  setTimeout(() => dispatch({ type: 'SHOW_COACH' }), 1000);
                }
              }, 2000);
            }, node.delay);
          });
        }
      }, [phase, executionTree]);

      // Execution progress
      useEffect(() => {
        if (phase === 'execution') {
          const interval = setInterval(() => {
            dispatch({ type: 'UPDATE_PROGRESS', payload: Math.min(executionProgress + 10, 100) });
          }, 500);
          return () => clearInterval(interval);
        }
      }, [phase, executionProgress]);

      // Start countdown when execution completes
      useEffect(() => {
        if (executionProgress >= 100 && phase === 'execution') {
          setTimeout(() => {
            dispatch({ type: 'START_COUNTDOWN' });
            const interval = setInterval(() => {
              dispatch({ type: 'TICK_COUNTDOWN' });
            }, 100);
            return () => clearInterval(interval);
          }, 1000);
        }
      }, [executionProgress, phase]);

      // Show success when countdown reaches 0
      useEffect(() => {
        if (countdownTimer === 0 && phase === 'execution') {
          setTimeout(() => dispatch({ type: 'SHOW_SUCCESS' }), 500);
        }
      }, [countdownTimer, phase]);

      const handleInvestigate = () => {
        dispatch({ type: 'START_INVESTIGATION' });
      };

      const handleApprove = () => {
        dispatch({ type: 'START_EXECUTION' });
      };

      return (
        <div className="h-screen flex flex-col bg-[#060A08]">
          <URLBar url={url} />

          {phase === 'detection' && (
            <DetectionPhase onInvestigate={handleInvestigate} />
          )}

          {(phase === 'analysis' || phase === 'coach' || phase === 'execution' || phase === 'success') && (
            <div className="flex-1 flex overflow-hidden">
              {/* Left Pane: 25% */}
              <div className="w-1/4 min-w-[280px]">
                <ExecutionTree nodes={executionTree} />
              </div>

              {/* Center Pane: 50% */}
              <div className="flex-1">
                <CausalCanvas
                  phase={phase}
                  onToggleHistorical={() => dispatch({ type: 'TOGGLE_HISTORICAL' })}
                  onTogglePattern={() => dispatch({ type: 'TOGGLE_PATTERN_CORPUS' })}
                />
              </div>

              {/* Right Pane: 25% */}
              <div className="w-1/4 min-w-[280px]">
                {phase === 'coach' && <RemediationPane phase={phase} onApprove={handleApprove} />}
                {phase === 'execution' && executionProgress < 100 && <ExecutionTerminal progress={executionProgress} onComplete={() => {}} />}
                {phase === 'execution' && executionProgress >= 100 && countdownTimer > 0 && <SuccessCountdown timer={countdownTimer} onComplete={() => {}} />}
                {phase === 'success' && <SuccessBanner />}
              </div>
            </div>

          {/* Modals */}
          {showHistoricalIncident && <HistoricalIncidentModal onClose={() => dispatch({ type: 'TOGGLE_HISTORICAL' })} />}
          {showPatternCorpus && <PatternCorpusModal onClose={() => dispatch({ type: 'TOGGLE_PATTERN_CORPUS' })} />}
        </div>
      );
    }

    // ==================== RENDER ====================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AutopilotApp />);
  </script>
</body>
</html>
